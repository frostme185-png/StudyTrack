<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:rgba(255,255,255,0.96);--bg2:rgba(240,240,240,0.92);
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:rgba(0,0,0,0.13);--accent:#1D9E75;
}
@media(prefers-color-scheme:dark){:root{
  --bg:rgba(28,28,30,0.96);--bg2:rgba(50,50,52,0.92);
  --text:#f0f0f0;--text2:#aaa;--text3:#666;--border:rgba(255,255,255,0.11);
}}
html,body{background:transparent;font-family:-apple-system,'Segoe UI',sans-serif;width:200px;height:258px;overflow:hidden;user-select:none}
/* Actual height is set inline by toggleBadgeStrip() (needs to match the OS
   window resize done in main.js's 'set-sticky-expanded' handler — STICKY_H_
   COMPACT/EXPANDED there must stay in sync with the 258/380 used here). */

.widget{
  background:var(--bg);border:1px solid var(--border);border-radius:14px;
  padding:11px 13px 13px;width:200px;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 4px 24px rgba(0,0,0,.18);
  position:relative;overflow:hidden;
}

/* ── Widget themes ── (#6 personalization: pick a look in Settings → Display) */
body[data-theme="gradient"] .widget{background:linear-gradient(135deg, var(--accent) 0%, rgba(0,0,0,.55) 100%);border-color:transparent}
body[data-theme="gradient"] .timer,body[data-theme="gradient"] .ring-pct,body[data-theme="gradient"] .hd-title{color:#fff}
body[data-theme="gradient"] .site-lbl{color:rgba(255,255,255,.75)}
body[data-theme="gradient"] .ring-bg{stroke:rgba(255,255,255,.25)}
body[data-theme="gradient"] .ring-fill{stroke:#fff}
body[data-theme="gradient"] .open-btn{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.3)}

body[data-theme="glass"] .widget{background:rgba(10,10,14,0.5);border:1px solid rgba(255,255,255,.14)}
body[data-theme="glass"] .timer,body[data-theme="glass"] .hd-title{color:#f5f5f5}
body[data-theme="glass"] .site-lbl,body[data-theme="glass"] .ring-pct{color:#cfd2d6}
body[data-theme="glass"] .ring-bg{stroke:rgba(255,255,255,.14)}
body[data-theme="glass"] .open-btn{background:rgba(255,255,255,.08);color:#f0f0f0;border-color:rgba(255,255,255,.16)}

body[data-theme="neon"] .widget{background:#0a0a0f;border:1px solid var(--accent);box-shadow:0 0 18px var(--accent)}
body[data-theme="neon"] .timer{color:var(--accent);text-shadow:0 0 8px var(--accent),0 0 18px var(--accent)}
body[data-theme="neon"] .hd-title,body[data-theme="neon"] .site-lbl,body[data-theme="neon"] .ring-pct{color:#9aa0aa}
body[data-theme="neon"] .ring-bg{stroke:#1a1a22}
body[data-theme="neon"] .ring-fill{filter:drop-shadow(0 0 4px var(--accent))}
body[data-theme="neon"] .open-btn{background:#14141c;color:var(--accent);border-color:var(--accent)}

/* Solid — flat card in the chosen accent color, no gradient/blur */
body[data-theme="solid"] .widget{background:var(--accent);border-color:transparent}
body[data-theme="solid"] .timer,body[data-theme="solid"] .ring-pct,body[data-theme="solid"] .hd-title{color:#fff}
body[data-theme="solid"] .site-lbl{color:rgba(255,255,255,.75)}
body[data-theme="solid"] .ring-bg{stroke:rgba(255,255,255,.25)}
body[data-theme="solid"] .ring-fill{stroke:#fff}
body[data-theme="solid"] .open-btn{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.3)}

/* Mono — deliberately ignores the accent color; grayscale, least distracting */
body[data-theme="mono"] .widget{background:#111114;border:1px solid #303035}
body[data-theme="mono"] .timer,body[data-theme="mono"] .hd-title{color:#eaeaea}
body[data-theme="mono"] .site-lbl,body[data-theme="mono"] .ring-pct{color:#8a8a8a}
body[data-theme="mono"] .ring-bg{stroke:#2a2a2e}
body[data-theme="mono"] .ring-fill{stroke:#eaeaea}
body[data-theme="mono"] .open-btn{background:#1a1a1d;color:#ddd;border-color:#303035}
body[data-theme="mono"] .hd-dot.on{background:#eaeaea;box-shadow:0 0 0 2px rgba(255,255,255,.15)}

/* Header */
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;cursor:move}
.hd-left{display:flex;align-items:center;gap:5px}
.hd-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.hd-dot.on{background:var(--accent);box-shadow:0 0 0 2px rgba(29,158,117,.25);animation:dotPulse 1.6s ease-in-out infinite}
.hd-dot.idle{background:#EF9F27}
@keyframes dotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.hd-title{font-size:11px;font-weight:600;color:var(--text2)}
.hd-right{display:flex;align-items:center;gap:5px}
.hd-badges-btn{
  width:16px;height:16px;border-radius:50%;border:none;
  background:var(--bg2);cursor:pointer;color:var(--text2);
  font-size:9px;display:flex;align-items:center;justify-content:center;
  -webkit-app-region:no-drag;transition:opacity .15s;flex-shrink:0;
  line-height:1;padding:0;
}
.hd-badges-btn:hover{opacity:.75}
.hd-badges-btn.open{background:var(--accent);color:#fff}
.hd-close{
  width:16px;height:16px;border-radius:50%;border:none;
  background:rgba(226,75,74,0.15);cursor:pointer;color:#E24B4A;
  font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;
  -webkit-app-region:no-drag;transition:background .15s;flex-shrink:0;
  line-height:1;
}
.hd-close:hover{background:rgba(226,75,74,0.35)}

/* ── Progress ring (#3) — replaces the old flat bar with a circular goal gauge,
   the timer + percent sit inside it so the whole thing reads as one gauge. */
.ring-wrap{position:relative;width:128px;height:128px;margin:4px auto 6px}
.ring-svg{width:128px;height:128px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg2);stroke-width:8}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .4s,stroke .3s}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.timer{
  font-size:18px;font-weight:600;letter-spacing:-.02em;
  color:var(--text);text-align:center;font-variant-numeric:tabular-nums;line-height:1;
}
.ring-pct{font-size:10px;color:var(--text3);font-weight:600}

/* Current site label + mascot (#5: emoji reflects state — waiting/tracking/idle/goal hit) */
.site-row{display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:8px;min-height:16px}
.mascot{font-size:12px;line-height:1;flex-shrink:0}
.site-lbl{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}

/* Level icon — always visible (unlike the badge strip below), reflects
   current all-time-hours tier from achievements.js. Custom SVG/PNG from
   assets/badges/level-<n>.svg if present, else a built-in emoji fallback. */
.level-icon{width:15px;height:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.level-icon img{width:100%;height:100%;object-fit:contain}

/* Open btn */
.open-btn{
  width:100%;font-size:11px;font-weight:500;padding:5px;
  border-radius:7px;border:1px solid var(--border);background:var(--bg2);
  cursor:pointer;color:var(--text);-webkit-app-region:no-drag;
}
.open-btn:hover{opacity:.8}

/* Badge strip — collapsed by default, revealed by the 🏅 header button
   (toggleBadgeStrip()), which also grows the widget's actual OS window
   height via window.api.setStickyExpanded() instead of the widget always
   taking up this space. Fixed 5-column grid (2 rows for the 10 BADGES) so
   all badges show at once with no horizontal scrollbar — must stay in sync
   with BADGES.length in achievements.js if that count ever changes. */
.badge-strip{max-height:0;overflow:hidden;transition:max-height .22s ease}
body.badges-open .badge-strip{max-height:96px;margin:8px 0 12px}
.badge-strip-hd{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.badge-strip-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.badge-chip{width:100%;aspect-ratio:1;border-radius:6px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px}
.badge-chip.locked{opacity:.35;filter:grayscale(1)}
.badge-chip img{width:100%;height:100%;object-fit:contain;border-radius:6px}

/* ── Goal-reached confetti burst (#4) — a handful of emoji particles spawned
   once per day the goal is first hit, animated up-and-out then removed. */
.confetti{position:absolute;font-size:14px;pointer-events:none;animation:confettiPop 1.1s ease-out forwards}
@keyframes confettiPop{
  0%{transform:translate(0,0) rotate(0deg);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0}
}
</style>
</head>
<body>
<div class="widget" id="widgetRoot">
  <div class="hd">
    <div class="hd-left">
      <div class="hd-dot" id="hdDot"></div>
      <span class="hd-title">StudyTrack</span>
    </div>
    <div class="hd-right">
      <button class="hd-badges-btn" id="badgesToggleBtn" onclick="toggleBadgeStrip()" title="Huy hiệu đã đạt">🏅</button>
      <button class="hd-close" onclick="window.api.closeSticky()" title="Close widget">✕</button>
    </div>
  </div>

  <!-- Circular goal-progress ring with the live timer inside -->
  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 100 100">
      <circle class="ring-bg" cx="50" cy="50" r="42"></circle>
      <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="42"></circle>
    </svg>
    <div class="ring-center">
      <div class="timer" id="timer">00:00:00</div>
      <div class="ring-pct" id="pctLbl">0%</div>
    </div>
  </div>

  <!-- Current site being tracked, with a mascot emoji reflecting current state,
       plus the current Level icon (always visible) -->
  <div class="site-row">
    <div class="level-icon" id="levelIcon" title="">🌱</div>
    <span class="mascot" id="mascot">⏳</span>
    <span class="site-lbl" id="siteLbl">—</span>
  </div>

  <!-- Collapsed by default — toggled via the 🏅 header button -->
  <div class="badge-strip" id="badgeStrip">
    <div class="badge-strip-hd">Huy hiệu</div>
    <div class="badge-strip-row" id="badgeStripRow"></div>
  </div>

  <button class="open-btn" onclick="window.api.openMain()">Open Dashboard</button>
</div>

<script src="achievements.js"></script>
<script>
let goalSecs      = 3 * 3600
let savedSecs     = 0    // seconds already in sessions[] for today
let liveAutoSecs  = 0    // current auto-track session (not yet saved), from main
let manualSecs    = 0    // current manual session running in renderer
let manualRunning = false
let isIdleNow     = false
let celebratedDate = null   // date string already celebrated with confetti, or null
let allSessions   = []   // full sessions[], for Level icon + badge strip (achievements.js)
let currentStreak = 0
let badgesOpen    = false

// The clock that drives the big timer number
// Runs every second; adds 1 if we are actively tracking (auto or manual)
let isTracking  = false   // true when auto-track has an active site

const RING_R = 42, RING_CIRC = 2 * Math.PI * RING_R
// Must stay in sync with index.html's ACCENT_PALETTE — no shared module
// between the two renderer files (see CLAUDE.md).
const ACCENT_COLORS = {
  green: '#1D9E75', blue: '#378ADD', pink: '#D4537E', purple: '#7F77DD',
  orange: '#C9710D', coral: '#B8331E', gray: '#6B6B6B',
}

function fmt(s) {
  s = Math.max(0, s)
  return [Math.floor(s/3600), Math.floor(s%3600/60), s%60]
    .map(v => String(v).padStart(2,'0')).join(':')
}
function todayStr() {
  const d = new Date()
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
}

// Total seconds to show = saved + current live auto session + manual if running
function totalDisplay() {
  return savedSecs + liveAutoSecs + (manualRunning ? manualSecs : 0)
}

// #5 — one emoji that summarizes "what's going on" at a glance, priority:
// goal hit > idle > actively tracking > just waiting.
function updateMascot(pct) {
  const el = document.getElementById('mascot')
  if (pct >= 100) el.textContent = '🎉'
  else if (isIdleNow) el.textContent = '😴'
  else if (isTracking || manualRunning) el.textContent = '🔥'
  else el.textContent = '⏳'
}

// Level icon (always visible) + badge strip (collapsed behind the 🏅 toggle)
// — data/rules come from achievements.js, shared with the Dashboard so the
// two never drift apart. Rebuilt whenever allSessions/currentStreak refresh
// (init + stats-updated), same cadence as the Dashboard's own rebuilds.
async function refreshAchievements() {
  const totalHours = allSessions.reduce((a, s) => a + s.seconds, 0) / 3600
  const { current } = computeLevel(totalHours)
  const iconEl = document.getElementById('levelIcon')
  iconEl.title = `Level ${current.lvl} — ${current.title}`
  const levelSrc = await resolveAchievementIcon(`level-${current.lvl}`)
  iconEl.innerHTML = levelSrc ? `<img src="${levelSrc}" alt="">` : '🌱'

  const states = computeBadgeStates(allSessions, currentStreak, goalSecs)
  const row = document.getElementById('badgeStripRow')
  row.innerHTML = states.map(b => {
    const fallback = BADGE_FALLBACK_EMOJI[b.kind] || '🏅'
    return `<div class="badge-chip ${b.earned ? '' : 'locked'}" id="chip-${b.id}" title="${b.label}">${fallback}</div>`
  }).join('')
  states.forEach(async b => {
    const src = await resolveAchievementIcon(b.id)
    if (!src) return
    const el = document.getElementById(`chip-${b.id}`)
    if (el) el.innerHTML = `<img src="${src}" alt="">`
  })
}

// Grows/shrinks the widget's actual OS window (main.js 'set-sticky-expanded')
// instead of the widget always reserving this space — see STICKY_H_COMPACT/
// EXPANDED in main.js, which must stay in sync with the 258/380 below.
function toggleBadgeStrip() {
  badgesOpen = !badgesOpen
  document.body.classList.toggle('badges-open', badgesOpen)
  document.documentElement.style.height = badgesOpen ? '380px' : '258px'
  document.body.style.height = badgesOpen ? '380px' : '258px'
  document.getElementById('badgesToggleBtn').classList.toggle('open', badgesOpen)
  window.api.setStickyExpanded(badgesOpen)
}

// #4 — small celebratory burst, fired once the first time goal is reached each day
function celebrateGoalIfNeeded(pct) {
  const today = todayStr()
  if (pct < 100 || celebratedDate === today) return
  celebratedDate = today
  const root = document.getElementById('widgetRoot')
  const emojis = ['🎉','✨','⭐','🎊']
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('span')
    p.className = 'confetti'
    p.textContent = emojis[i % emojis.length]
    const dx = (Math.random() - 0.5) * 140
    const dy = -60 - Math.random() * 60
    p.style.setProperty('--dx', dx + 'px')
    p.style.setProperty('--dy', dy + 'px')
    p.style.setProperty('--rot', (Math.random()*60 - 30) + 'deg')
    p.style.left = (40 + Math.random()*120) + 'px'
    p.style.top  = (60 + Math.random()*40) + 'px'
    root.appendChild(p)
    p.addEventListener('animationend', () => p.remove())
  }
}

function refreshUI() {
  const total = totalDisplay()
  const pct = Math.min(100, Math.round(total / goalSecs * 100))
  document.getElementById('timer').textContent  = fmt(total)
  document.getElementById('pctLbl').textContent = pct + '%'
  const offset = RING_CIRC * (1 - pct / 100)
  const ring = document.getElementById('ringFill')
  ring.style.strokeDasharray  = RING_CIRC
  ring.style.strokeDashoffset = offset
  updateMascot(pct)
  celebrateGoalIfNeeded(pct)
}

// Called every second by setInterval — increments liveAutoSecs if tracking
setInterval(() => {
  if (isTracking) {
    liveAutoSecs++
    refreshUI()
  } else if (manualRunning) {
    manualSecs++
    refreshUI()
  }
}, 1000)

// #1/#6 — reflect the dashboard's streak color + chosen widget theme here too,
// instead of a hardcoded accent — this is the same personalization already
// available in Settings, just not wired into the widget before.
function applyPersonalization(settings) {
  const name = settings?.accentColor || settings?.streakColor || 'green'
  const accent = ACCENT_COLORS[name] || ACCENT_COLORS.green
  document.documentElement.style.setProperty('--accent', accent)
  document.body.dataset.theme = settings?.widgetTheme || 'minimal'
}

// ── Events from main ─────────────────────────────────────────

window.api.on('auto-track-update', p => {
  if (p.domain) {
    isTracking = true
    isIdleNow = false
    // IMPORTANT: must use liveUnflushed (seconds not yet on disk), NOT accumSecs
    // (which is the whole session's total and keeps growing across periodic
    // flushes). savedSecs already includes everything flushed so far, so adding
    // the full accumSecs on top double-counts that part every ~30s flush —
    // that's what caused the widget to briefly dip then jump far ahead.
    liveAutoSecs = p.liveUnflushed ?? 0
    document.getElementById('hdDot').className  = 'hd-dot on'
    document.getElementById('siteLbl').textContent = p.siteName
  } else {
    if (isTracking) {
      // just left a study site — liveAutoSecs will be flushed by main
      // reset so we don't double count after flush
      liveAutoSecs = 0
    }
    isTracking = false
    document.getElementById('hdDot').className     = 'hd-dot'
    document.getElementById('siteLbl').textContent = 'No study site in focus'
  }
  refreshUI()
})

// Fired after main flushes a session to disk (auto or manual)
window.api.on('stats-updated', async p => {
  savedSecs    = p.todaySeconds || 0
  liveAutoSecs = 0   // main already counted these in savedSecs
  refreshUI()
  // Level/badges change rarely, so re-fetching the full sessions list on this
  // (infrequent) event is fine — same "always re-fetch, don't trust a stale
  // cached aggregate" approach syncWithCloud() uses in index.html.
  currentStreak = p.streak ?? currentStreak
  const data = await window.api.getData()
  allSessions = data.sessions || []
  refreshAchievements()
})

window.api.on('idle-state', isIdle => {
  isIdleNow = isIdle
  if (isIdle) {
    isTracking = false
    document.getElementById('hdDot').className     = 'hd-dot idle'
    document.getElementById('siteLbl').textContent = 'Idle — paused'
    liveAutoSecs = 0
  }
  refreshUI()
})

window.api.on('settings-updated', s => {
  goalSecs = (s.goalHours || 3) * 3600
  applyPersonalization(s)
  refreshUI()
})

// ── Drag header to move widget ────────────────────────────────
document.querySelector('.hd').addEventListener('mousedown', e => {
  if (e.target.closest('.hd-close') || e.target.closest('.hd-badges-btn')) return
  window.api.stickyDragStart()
})
document.addEventListener('mouseup', () => window.api.stickyDragEnd())

// ── Init ─────────────────────────────────────────────────────
async function init() {
  const data  = await window.api.getData()
  goalSecs    = (data.settings?.goalHours || 3) * 3600
  savedSecs   = data.todaySeconds || 0
  allSessions = data.sessions || []
  currentStreak = data.streak || 0
  applyPersonalization(data.settings)
  refreshUI()
  refreshAchievements()
  document.getElementById('siteLbl').textContent = 'Waiting for activity...'
}
init()
</script>
</body>
</html>
